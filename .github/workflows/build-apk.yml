name: Build Android APK

# Builds the MyTCG Android APK (Capacitor + Chaquopy) on every push to main,
# and on demand via the "Run workflow" button. Each main build is stamped with
# a monotonic version and published as the "latest" GitHub Release; installed
# apps poll that release (js/update.js) and prompt the user to download the new
# APK. The APK is also uploaded as a workflow artifact.
on:
  push:
    branches: [main]
    # Only rebuild when something that ends up in the APK changes.
    paths:
      - "mobile-apk/**"
      - "src/server/engine/**"
      - "src/server/webapp/**"
      - "src/server/model/policy_weights.json"
      - "tables/**"
      - "decklists/**"
      - "scripts/sync_mobile.py"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

# Needed to publish the GitHub Release the update check reads from.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Chaquopy needs a Python 3.11 interpreter on the build machine (buildPython)
      # to match the app's target version (chaquopy { version = "3.11" }).
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Fail early if the generated mobile-apk/ tree drifted from the masters
      # under src/. Same check that tests/test_mobile_sync.py enforces.
      - name: Verify mobile tree is in sync
        run: python scripts/sync_mobile.py --check

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile-apk/android/**/*.gradle', 'mobile-apk/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # run_number increases with every run of this workflow, so it makes a
      # monotonic versionCode the installed app can compare against the release
      # tag (v<run_number>). versionName is human-facing.
      - name: Build debug APK
        working-directory: mobile-apk/android
        run: >-
          ./gradlew assembleDebug --no-daemon --stacktrace
          -PappVersionCode=${{ github.run_number }}
          -PappVersionName=1.0.${{ github.run_number }}

      - name: Stage APK
        run: |
          mkdir -p dist
          cp mobile-apk/android/app/build/outputs/apk/debug/app-debug.apk \
            "dist/mytcg-v${{ github.run_number }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mytcg-debug-apk
          path: dist/*.apk
          if-no-files-found: error

      # Publish the release the in-app update check polls. Only on real main
      # builds (and manual dispatch) — not needed for other events. Marked
      # --latest so the /releases/latest API returns it.
      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "v${{ github.run_number }}"
          "dist/mytcg-v${{ github.run_number }}.apk"
          --repo "${{ github.repository }}"
          --title "MyTCG v1.0.${{ github.run_number }}"
          --notes "Automated build from ${{ github.sha }}."
          --latest
