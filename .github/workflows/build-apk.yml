name: Build Android APK

# Builds the MyTCG Android APK (Capacitor + Chaquopy) on every push to main,
# and on demand via the "Run workflow" button. The built debug APK is uploaded
# as a workflow artifact you can download from the run summary.
on:
  push:
    branches: [main]
    # Only rebuild when something that ends up in the APK changes.
    paths:
      - "mobile-apk/**"
      - "src/server/engine/**"
      - "src/server/webapp/**"
      - "src/server/model/policy_weights.json"
      - "tables/**"
      - "decklists/**"
      - "scripts/sync_mobile.py"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Chaquopy needs a Python 3.11 interpreter on the build machine (buildPython)
      # to match the app's target version (chaquopy { version = "3.11" }).
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Fail early if the generated mobile-apk/ tree drifted from the masters
      # under src/. Same check that tests/test_mobile_sync.py enforces.
      - name: Verify mobile tree is in sync
        run: python scripts/sync_mobile.py --check

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile-apk/android/**/*.gradle', 'mobile-apk/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build debug APK
        working-directory: mobile-apk/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mytcg-debug-apk
          path: mobile-apk/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
